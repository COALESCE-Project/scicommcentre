signup_module.signup_form:
  path: '/signup'
  defaults:
    _form: '\Drupal\signup_module\Form\SignupForm'
    _title: 'User Sign-Up'
  requirements:
    _permission: 'access content'


signup_module.verification_sent:
  path: '/signup/verification-sent'
  defaults:
    _controller: '\Drupal\signup_module\Controller\SignupController::verificationSent'
    _title: 'Verification Email Sent'
  requirements:
    _permission: 'access content'


signup_module.verify_user:
  path: '/signup/verify/{user}'
  defaults:
    _controller: '\Drupal\signup_module\Controller\SignupController::verifyUser'
    _title: 'Verify User'
  requirements:
    _access: 'TRUE' 





